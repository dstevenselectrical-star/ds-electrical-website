  <!-- Red bar with "Electrical" -->
  <rect x="35" y="232" width="130" height="32" rx="2" fill="#E60012"/>
  <text x="100" y="254" text-anchor="middle" font-family="Arial, sans-serif" font-weight="700" font-size="18" fill="#FFFFFF">Electrical</text>
