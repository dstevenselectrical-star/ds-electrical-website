    <line x1="40" y1="20" x2="145" y2="20"/>
    <line x1="40" y1="30" x2="145" y2="30"/>
    <line x1="40" y1="40" x2="145" y2="40"/>
    <line x1="40" y1="50" x2="145" y2="50"/>
